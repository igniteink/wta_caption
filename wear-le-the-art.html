<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WEAR le THE ART | 展示キャプション</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #6d6d72;
      --line: #dedee3;
      --paper: #ffffff;
      --soft: #f4f4f5;
      --pink: #df2b8d;
      --blue: #2499d6;
      --violet: #6b55b7;
      --shadow: 0 28px 80px rgba(14, 18, 28, 0.16);
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    html {
      min-height: 100%;
      background: #ececef;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.96), rgba(239,239,242,0.92) 56%, rgba(225,226,230,0.9)),
        #ececef;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Meiryo", sans-serif;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: relative;
      width: min(100%, 430px);
      min-height: 100dvh;
      margin: 0 auto;
      overflow-x: hidden;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 24px 18px 0;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(18px);
    }

    .brand-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
    }

    .brand-mark {
      display: inline-flex;
      flex-direction: column;
      color: inherit;
      text-decoration: none;
    }

    .brand-name {
      display: block;
      max-width: 300px;
      background: linear-gradient(100deg, var(--pink), var(--violet) 52%, var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 32px;
      font-weight: 900;
      line-height: 0.9;
      white-space: nowrap;
    }

    .brand-sub {
      margin-top: 6px;
      color: #8060aa;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.3;
      text-transform: uppercase;
    }

    .menu-button {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .menu-button-lines {
      display: grid;
      gap: 6px;
      width: 28px;
    }

    .menu-button-lines span {
      display: block;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--pink), var(--blue));
      border-radius: 999px;
    }

    .tab-strip {
      display: flex;
      gap: 19px;
      margin: 22px -18px 0;
      padding: 0 18px 4px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      scroll-snap-type: x proximity;
    }

    .tab-strip::-webkit-scrollbar {
      display: none;
    }

    .tab-button {
      position: relative;
      flex: 0 0 auto;
      min-width: 46px;
      height: 42px;
      border: 0;
      border-bottom: 3px solid transparent;
      background: transparent;
      color: #6f6f74;
      font: inherit;
      font-size: 18px;
      font-weight: 760;
      line-height: 1;
      cursor: pointer;
      scroll-snap-align: start;
    }

    .tab-button[data-view="top"] {
      min-width: 56px;
    }

    .tab-button.is-active {
      border-bottom-color: var(--pink);
      color: var(--pink);
    }

    .content {
      padding: 16px 18px 86px;
    }

    .content:focus {
      outline: none;
    }

    .home-hero {
      min-height: 292px;
      padding: 22px;
      overflow: hidden;
      border-radius: 6px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(22,22,26,0.4), rgba(22,22,26,0.05)),
        linear-gradient(135deg, #e12c8e 0%, #6557bb 48%, #27a6d6 100%);
    }

    .home-label {
      margin: 0;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.5;
      text-transform: uppercase;
    }

    .home-title {
      max-width: 10em;
      margin: 46px 0 0;
      font-size: 34px;
      font-weight: 900;
      line-height: 1.08;
    }

    .home-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
      padding: 0;
      list-style: none;
    }

    .home-meta li {
      min-height: 34px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.3;
    }

    .section-heading {
      margin: 24px 0 12px;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.4;
      color: var(--muted);
      text-transform: uppercase;
    }

    .pickup-list {
      display: grid;
      gap: 1px;
      overflow: hidden;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: var(--line);
    }

    .pickup-button {
      display: grid;
      grid-template-columns: 56px 1fr 26px;
      align-items: center;
      gap: 14px;
      min-height: 66px;
      padding: 10px 0;
      border: 0;
      background: #fff;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .pickup-number {
      color: var(--pink);
      font-size: 18px;
      font-weight: 900;
      text-align: center;
    }

    .pickup-main {
      min-width: 0;
    }

    .pickup-title {
      display: block;
      overflow-wrap: anywhere;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.45;
    }

    .pickup-artist {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      overflow-wrap: anywhere;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }

    .pickup-arrow {
      color: var(--blue);
      font-size: 22px;
      font-weight: 700;
    }

    .work-kicker {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .work-number {
      margin: 0;
      background: linear-gradient(100deg, var(--pink), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.2;
    }

    .work-index {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      line-height: 1.4;
    }

    .work-visual {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 4px;
      background:
        radial-gradient(circle at 25% 18%, rgba(255,255,255,0.82), rgba(255,255,255,0) 26%),
        linear-gradient(135deg, var(--visual-a), var(--visual-b));
      isolation: isolate;
    }

    .work-visual::before {
      position: absolute;
      inset: 12%;
      content: "";
      border: 1px solid rgba(255,255,255,0.38);
      transform: rotate(-8deg);
      z-index: 0;
    }

    .work-visual::after {
      position: absolute;
      right: 10%;
      bottom: 9%;
      width: 34%;
      aspect-ratio: 1 / 1;
      content: "";
      border: 10px solid rgba(255,255,255,0.5);
      transform: rotate(13deg);
      z-index: 0;
    }

    .hanger {
      position: absolute;
      top: 10%;
      width: 118px;
      height: 48px;
      border-top: 7px solid #b87a42;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-radius: 52% 52% 0 0;
      z-index: 2;
    }

    .hanger::before {
      position: absolute;
      top: -32px;
      left: calc(50% - 9px);
      width: 18px;
      height: 30px;
      content: "";
      border: 5px solid #b87a42;
      border-bottom: 0;
      border-radius: 18px 18px 0 0;
    }

    .shirt {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 66%;
      max-width: 260px;
      aspect-ratio: 0.76 / 1;
      margin-top: 34px;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.04), rgba(255,255,255,0.38) 24%, rgba(0,0,0,0.02) 64%, rgba(0,0,0,0.06)),
        #fff;
      clip-path: polygon(24% 0, 38% 0, 42% 6%, 58% 6%, 62% 0, 76% 0, 100% 22%, 84% 38%, 78% 30%, 78% 100%, 22% 100%, 22% 30%, 16% 38%, 0 22%);
      filter: drop-shadow(0 22px 22px rgba(0,0,0,0.18));
    }

    .shirt::before {
      position: absolute;
      top: 9%;
      left: 39%;
      width: 22%;
      height: 9%;
      content: "";
      border-bottom: 3px solid #e5e5e8;
      border-radius: 0 0 999px 999px;
    }

    .shirt-design {
      position: relative;
      width: 48%;
      aspect-ratio: 0.72 / 1;
      overflow: hidden;
      border-radius: 2px;
      background:
        linear-gradient(90deg, var(--visual-a), var(--visual-b)),
        #ddd;
      box-shadow: 0 14px 18px rgba(0,0,0,0.12);
    }

    .shirt-design::before {
      position: absolute;
      inset: 16% 13%;
      content: "";
      border: 8px solid rgba(255,255,255,0.74);
      transform: rotate(-12deg);
    }

    .shirt-design::after {
      position: absolute;
      inset: 0;
      content: "";
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.22) 0 2px, transparent 2px 16px),
        repeating-linear-gradient(90deg, rgba(0,0,0,0.08) 0 1px, transparent 1px 18px);
      mix-blend-mode: overlay;
    }

    .info-list {
      margin-top: 24px;
      border-top: 1px solid var(--line);
    }

    .info-row {
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr);
      align-items: center;
      min-height: 64px;
      border-bottom: 1px solid var(--line);
    }

    .info-label {
      background: linear-gradient(100deg, var(--pink), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.4;
    }

    .info-value {
      min-width: 0;
      color: var(--ink);
      font-size: 16px;
      font-weight: 820;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .sns-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      padding: 10px 0;
    }

    .sns-link {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
    }

    .sns-link:focus-visible,
    .tab-button:focus-visible,
    .menu-button:focus-visible,
    .pickup-button:focus-visible,
    .menu-item:focus-visible {
      outline: 3px solid rgba(36,153,214,0.32);
      outline-offset: 2px;
    }

    .sns-link svg {
      width: 28px;
      height: 28px;
      stroke-width: 1.9;
    }

    .caption-block {
      padding-top: 20px;
    }

    .caption-heading {
      margin: 0 0 10px;
      background: linear-gradient(100deg, var(--pink), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.45;
    }

    .caption-text {
      margin: 0;
      white-space: pre-line;
      color: #202024;
      font-size: 15px;
      font-weight: 520;
      line-height: 1.86;
      overflow-wrap: anywhere;
    }

    .site-footer {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 25;
      width: min(100%, 430px);
      height: calc(46px + env(safe-area-inset-bottom));
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
      display: grid;
      place-items: center;
      background: linear-gradient(100deg, var(--pink), var(--violet), var(--blue));
      color: #fff;
      font-size: 13px;
      font-weight: 850;
      line-height: 1;
      text-transform: uppercase;
    }

    .menu-backdrop {
      position: fixed;
      inset: 0;
      z-index: 38;
      background: rgba(18,18,22,0.32);
    }

    .menu-panel {
      position: fixed;
      top: 0;
      left: 50%;
      z-index: 40;
      width: min(100%, 430px);
      max-height: 86dvh;
      padding: 24px 18px 28px;
      overflow-y: auto;
      background: #fff;
      box-shadow: 0 30px 80px rgba(10,10,16,0.22);
      transform: translateX(-50%);
    }

    [hidden] {
      display: none !important;
    }

    .menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .menu-title {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.5;
    }

    .menu-close {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .menu-item {
      display: grid;
      place-items: center;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
      font-weight: 850;
      text-decoration: none;
      cursor: pointer;
    }

    .menu-item.is-active {
      border-color: transparent;
      background: linear-gradient(100deg, var(--pink), var(--blue));
      color: #fff;
    }

    .empty-state {
      padding: 44px 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    @media (max-width: 360px) {
      .site-header {
        padding-right: 14px;
        padding-left: 14px;
      }

      .brand-name {
        font-size: 28px;
      }

      .content {
        padding-right: 14px;
        padding-left: 14px;
      }

      .tab-strip {
        margin-right: -14px;
        margin-left: -14px;
        padding-right: 14px;
        padding-left: 14px;
      }

      .info-row {
        grid-template-columns: 96px minmax(0, 1fr);
      }

      .info-label,
      .info-value {
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .work-visual,
      .home-hero,
      .pickup-button,
      .tab-button {
        transition: transform 180ms ease, border-color 180ms ease, color 180ms ease;
      }

      .pickup-button:active {
        transform: scale(0.99);
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="site-header">
      <div class="brand-row">
        <a class="brand-mark" href="#top" data-link="top" aria-label="トップへ">
          <span class="brand-name">WEAR le THE ART</span>
          <span class="brand-sub">T-SHIRT ART EXHIBITION</span>
        </a>
        <button class="menu-button" type="button" id="menuButton" aria-label="メニューを開く" aria-expanded="false">
          <span class="menu-button-lines" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
      <nav class="tab-strip" id="tabStrip" aria-label="作品番号"></nav>
    </header>

    <main class="content" id="content" tabindex="-1"></main>

    <footer class="site-footer">WEAR le THE ART</footer>
  </div>

  <div class="menu-backdrop" id="menuBackdrop" hidden></div>
  <aside class="menu-panel" id="menuPanel" hidden aria-label="メニュー">
    <div class="menu-head">
      <p class="menu-title">INDEX</p>
      <button class="menu-close" type="button" id="menuClose" aria-label="メニューを閉じる">×</button>
    </div>
    <div class="menu-grid" id="menuGrid"></div>
  </aside>

        website: "https://example.com/",
        caption: "首元から外へひらく線を、対話の始まりとして描きました。\n着る人と見る人のあいだに、余白のある距離をつくります。",
        colors: ["#28a66f", "#d73b92"]
      }
    ];

    const icons = {
      instagram: '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4.2"></circle><circle cx="17.5" cy="6.5" r="1.1" fill="currentColor" stroke="none"></circle></svg>',
      x: '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"><path d="M4 4l16 16"></path><path d="M20 4L4 20"></path></svg>',
      website: '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18"></path><path d="M12 3c2.4 2.5 3.5 5.5 3.5 9s-1.1 6.5-3.5 9"></path><path d="M12 3c-2.4 2.5-3.5 5.5-3.5 9s1.1 6.5 3.5 9"></path></svg>'
    };

    const tabStrip = document.getElementById("tabStrip");
    const content = document.getElementById("content");
    const menuButton = document.getElementById("menuButton");
    const menuBackdrop = document.getElementById("menuBackdrop");
    const menuPanel = document.getElementById("menuPanel");
    const menuClose = document.getElementById("menuClose");
    const menuGrid = document.getElementById("menuGrid");

    let currentView = "top";

    function createButton(label, view, className) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = className;
      button.textContent = label;
      button.dataset.view = view;
      button.addEventListener("click", () => navigate(view));
      return button;
    }

    function buildNavigation() {
      tabStrip.innerHTML = "";
      tabStrip.append(createButton("TOP", "top", "tab-button"));
      works.forEach((work) => {
        tabStrip.append(createButton(work.number, work.number, "tab-button"));
      });

      menuGrid.innerHTML = "";
      menuGrid.append(createButton("TOP", "top", "menu-item"));
      works.forEach((work) => {
        menuGrid.append(createButton(work.number, work.number, "menu-item"));
      });
    }

    function setActiveNavigation(view) {
      document.querySelectorAll("[data-view]").forEach((button) => {
        const isActive = button.dataset.view === view;
        button.classList.toggle("is-active", isActive);
        if (button.classList.contains("tab-button")) {
          button.setAttribute("aria-current", isActive ? "page" : "false");
        }
      });

      const activeTab = tabStrip.querySelector(`[data-view="${view}"]`);
      if (activeTab) {
        activeTab.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
      }
    }

    function renderHome() {
      const firstWorks = works.slice(0, 5);
      content.innerHTML = `
        <section class="home-view" aria-labelledby="homeTitle">
          <div class="home-hero">
            <p class="home-label">CAPTION CATALOG</p>
            <h1 class="home-title" id="homeTitle">展示キャプション</h1>
            <ul class="home-meta" aria-label="展示情報">
              <li>${works.length} WORKS</li>
              <li>WEARABLE ART</li>
              <li>2026</li>
            </ul>
          </div>
          <h2 class="section-heading">WORKS</h2>
          <div class="pickup-list">
            ${firstWorks.map((work) => `
              <button class="pickup-button" type="button" data-pickup="${work.number}">
                <span class="pickup-number">${work.number}</span>
                <span class="pickup-main">
                  <span class="pickup-title">${work.title}</span>
                  <span class="pickup-artist">${work.artist}</span>
                </span>
                <span class="pickup-arrow" aria-hidden="true">›</span>
              </button>
            `).join("")}
          </div>
        </section>
      `;

      content.querySelectorAll("[data-pickup]").forEach((button) => {
        button.addEventListener("click", () => navigate(button.dataset.pickup));
      });
    }

    function renderWork(work) {
      if (!work) {
        content.innerHTML = '<p class="empty-state">該当する作品情報がありません。</p>';
        return;
      }

      content.innerHTML = `
        <article class="work-view" aria-labelledby="workTitle">
          <div class="work-kicker">
            <h1 class="work-number" id="workTitle">WORK ${work.number}</h1>
            <p class="work-index">${Number(work.number)} / ${works.length}</p>
          </div>

          <div class="work-visual" style="--visual-a: ${work.colors[0]}; --visual-b: ${work.colors[1]};" aria-label="${work.title} の作品ビジュアル" role="img">
            <div class="hanger" aria-hidden="true"></div>
            <div class="shirt" aria-hidden="true">
              <div class="shirt-design"></div>
            </div>
          </div>

          <dl class="info-list">
            <div class="info-row">
              <dt class="info-label">作品番号</dt>
              <dd class="info-value">${work.number}</dd>
            </div>
            <div class="info-row">
              <dt class="info-label">出展者名</dt>
              <dd class="info-value">${work.artist}</dd>
            </div>
            <div class="info-row">
              <dt class="info-label">SNSリンク</dt>
              <dd class="info-value">
                <div class="sns-links">
                  ${socialLink("Instagram", work.instagram, icons.instagram)}
                  ${socialLink("X", work.x, icons.x)}
                  ${socialLink("Web", work.website, icons.website)}
                </div>
              </dd>
            </div>
            <div class="info-row">
              <dt class="info-label">作品名</dt>
              <dd class="info-value">${work.title}</dd>
            </div>
          </dl>

          <section class="caption-block" aria-labelledby="captionTitle">
            <h2 class="caption-heading" id="captionTitle">キャプション</h2>
            <p class="caption-text">${work.caption}</p>
          </section>
        </article>
      `;
    }

    function socialLink(label, href, icon) {
      if (!href) {
        return "";
      }
      return `<a class="sns-link" href="${href}" target="_blank" rel="noopener noreferrer" aria-label="${label}">${icon}</a>`;
    }

    function render(view) {
      currentView = view;
      if (view === "top") {
        renderHome();
      } else {
        renderWork(works.find((work) => work.number === view));
      }
      setActiveNavigation(view);
      closeMenu();
      content.focus({ preventScroll: true });
    }

    function navigate(view) {
      const hash = view === "top" ? "#top" : `#work-${view}`;
      if (window.location.hash !== hash) {
        window.history.pushState({ view }, "", hash);
      }
      render(view);
    }

    function viewFromHash() {
      const hash = window.location.hash.replace("#", "");
      if (!hash || hash === "top") {
        return "top";
      }
      const match = hash.match(/^work-(\d{2})$/);
      if (match && works.some((work) => work.number === match[1])) {
        return match[1];
      }
      return "top";
    }

    function openMenu() {
      menuBackdrop.hidden = false;
      menuPanel.hidden = false;
      menuButton.setAttribute("aria-expanded", "true");
      menuClose.focus();
    }

    function closeMenu() {
      menuBackdrop.hidden = true;
      menuPanel.hidden = true;
      menuButton.setAttribute("aria-expanded", "false");
    }

    menuButton.addEventListener("click", openMenu);
    menuClose.addEventListener("click", closeMenu);
    menuBackdrop.addEventListener("click", closeMenu);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !menuPanel.hidden) {
        closeMenu();
        menuButton.focus();
      }

      const activeIndex = works.findIndex((work) => work.number === currentView);
      if (event.key === "ArrowRight" && activeIndex >= 0 && activeIndex < works.length - 1) {
        navigate(works[activeIndex + 1].number);
      }
      if (event.key === "ArrowLeft" && activeIndex > 0) {
        navigate(works[activeIndex - 1].number);
      }
    });

    window.addEventListener("popstate", () => render(viewFromHash()));

    buildNavigation();
    render(viewFromHash());
  </script>
</body>
</html>
