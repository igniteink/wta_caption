<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>展示キャプションサイトを選択</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #242321;
      --muted: #6d675e;
      --paper: #fffdf8;
      --paper-soft: #f4efe6;
      --line: #d7cec0;
      --green: #4f604f;
      --rose: #be4d7d;
      --blue: #2a8db8;
      --violet: #6655a8;
      --shadow: 0 22px 54px rgba(36, 35, 33, 0.16);
      --serif: "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", "YuMincho", serif;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background:
        radial-gradient(circle at 22% 10%, rgba(190, 77, 125, 0.18), transparent 19rem),
        radial-gradient(circle at 86% 78%, rgba(42, 141, 184, 0.16), transparent 22rem),
        #ece7dd;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.75;
      letter-spacing: 0px;
      background:
        linear-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
      background-size: 34px 34px;
    }

    a {
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .shell {
      display: flex;
      width: min(100%, 480px);
      min-height: 100vh;
      margin: 0 auto;
      flex-direction: column;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .intro {
      padding: calc(env(safe-area-inset-top) + 34px) 22px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.92);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.4;
    }

    h1 {
      margin: 0;
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.18;
      letter-spacing: 0px;
    }

    .lead {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .choices {
      display: grid;
      gap: 14px;
      padding: 22px;
    }

    .choice {
      display: grid;
      grid-template-columns: 94px minmax(0, 1fr);
      min-height: 150px;
      overflow: hidden;
      color: var(--ink);
      text-decoration: none;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .choice:focus-visible {
      outline: 3px solid rgba(42, 141, 184, 0.32);
      outline-offset: 3px;
    }

    .preview {
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--line);
      background: var(--paper-soft);
    }

    .preview::before,
    .preview::after {
      position: absolute;
      content: "";
    }

    .preview-classic {
      background:
        radial-gradient(circle at 50% 23%, rgba(255, 250, 238, 0.96), rgba(104, 101, 92, 0.85) 66%),
        #706c63;
    }

    .preview-classic::before {
      left: 24px;
      top: 36px;
      width: 45px;
      height: 70px;
      background: #f6f1e8;
      clip-path: polygon(24% 0, 38% 0, 43% 8%, 57% 8%, 62% 0, 76% 0, 100% 20%, 82% 36%, 76% 30%, 76% 100%, 24% 100%, 24% 30%, 18% 36%, 0 20%);
      box-shadow: 0 18px 24px rgba(0, 0, 0, 0.2);
    }

    .preview-classic::after {
      left: 31px;
      top: 64px;
      width: 50px;
      height: 28px;
      border-top: 6px solid var(--green);
      border-radius: 100% 18% 0 0;
      transform: rotate(-21deg);
    }

    .preview-pop {
      background:
        linear-gradient(135deg, rgba(223, 43, 141, 0.88), rgba(102, 85, 168, 0.9) 48%, rgba(36, 153, 214, 0.88)),
        #fff;
    }

    .preview-pop::before {
      left: 18px;
      top: 29px;
      width: 58px;
      height: 82px;
      background: #fff;
      clip-path: polygon(24% 0, 38% 0, 43% 8%, 57% 8%, 62% 0, 76% 0, 100% 22%, 84% 38%, 78% 30%, 78% 100%, 22% 100%, 22% 30%, 16% 38%, 0 22%);
      filter: drop-shadow(0 16px 18px rgba(0, 0, 0, 0.22));
    }

    .preview-pop::after {
      left: 30px;
      top: 58px;
      width: 34px;
      height: 44px;
      background:
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.32) 0 2px, transparent 2px 12px),
        linear-gradient(135deg, var(--rose), var(--blue));
      transform: rotate(-8deg);
    }

    .choice-body {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: center;
      padding: 16px;
    }

    .choice-name {
      margin: 0;
      font-family: var(--serif);
      font-size: 1.14rem;
      font-weight: 400;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .choice-desc {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.65;
    }

    .choice-action {
      display: inline-flex;
      width: fit-content;
      min-height: 34px;
      align-items: center;
      margin-top: 12px;
      padding: 0 11px;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      background: var(--green);
      border-radius: 8px;
    }

    .choice:nth-child(2) .choice-action {
      background: linear-gradient(100deg, var(--rose), var(--violet), var(--blue));
    }

    .footer {
      margin-top: auto;
      padding: 22px 22px calc(env(safe-area-inset-bottom) + 24px);
      color: var(--muted);
      text-align: center;
      border-top: 1px solid var(--line);
      background: var(--paper-soft);
      font-size: 0.78rem;
    }

    @media (max-width: 360px) {
      .intro,
      .choices,
      .footer {
        padding-right: 18px;
        padding-left: 18px;
      }

      h1 {
        font-size: 1.72rem;
      }

      .choice {
        grid-template-columns: 82px minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="intro" aria-labelledby="pageTitle">
      <p class="eyebrow">Caption site selector</p>
      <h1 id="pageTitle">表示するサイトを選択</h1>
      <p class="lead">展示会場で使うキャプションサイトのデザインを選んで開けます。</p>
    </section>

    <nav class="choices" aria-label="サイト選択">
      <a class="choice" href="t-shirt-exhibition-2026.html">
        <span class="preview preview-classic" aria-hidden="true"></span>
        <span class="choice-body">
          <span class="choice-name">T-shirt exhibition 2026</span>
          <span class="choice-desc">落ち着いた紙面調のレイアウト。現在のサイトです。</span>
          <span class="choice-action">このサイトを開く</span>
        </span>
      </a>

      <a class="choice" href="wear-le-the-art.html">
        <span class="preview preview-pop" aria-hidden="true"></span>
        <span class="choice-body">
          <span class="choice-name">WEAR le THE ART</span>
          <span class="choice-desc">ピンクとブルーを使った別デザインのサイトです。</span>
          <span class="choice-action">このサイトを開く</span>
        </span>
      </a>
    </nav>

    <footer class="footer">T-shirt exhibition caption sites</footer>
  </main>
</body>
</html>
