<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WE&apos;AR&#47;e THE ART | 展示キャプション</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #6f6f76;
      --line: #dedee3;
      --paper: #ffffff;
      --soft: #f5f5f7;
      --pink: #df2b8d;
      --blue: #229bd7;
      --violet: #6b55b7;
      --shadow: 0 28px 80px rgba(14, 18, 28, 0.16);
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    html {
      min-height: 100%;
      background: #ececef;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.96), rgba(239,239,242,0.92) 56%, rgba(225,226,230,0.9)),
        #ececef;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", "Meiryo", sans-serif;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font: inherit;
    }

    .app {
      position: relative;
      width: min(100%, 430px);
      min-height: 100dvh;
      margin: 0 auto;
      overflow-x: hidden;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 18px 18px 0;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(18px);
    }

    .brand-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
    }

    .brand-mark {
      display: inline-flex;
      flex-direction: column;
      min-width: 0;
      color: inherit;
      text-decoration: none;
    }

    .brand-name {
      display: block;
      max-width: 300px;
      background: linear-gradient(100deg, var(--pink), var(--violet) 52%, var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 28px;
      font-weight: 900;
      line-height: 0.95;
      white-space: nowrap;
    }

    .brand-sub {
      margin-top: 5px;
      color: #8060aa;
      font-size: 10px;
      font-weight: 750;
      line-height: 1.3;
      text-transform: uppercase;
    }

    .menu-button {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .menu-button-lines {
      display: grid;
      gap: 6px;
      width: 28px;
    }

    .menu-button-lines span {
      display: block;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--pink), var(--blue));
      border-radius: 999px;
    }

    .tab-strip {
      display: flex;
      gap: 18px;
      margin: 18px -18px 0;
      padding: 0 18px 4px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      scroll-snap-type: x proximity;
    }

    .tab-strip::-webkit-scrollbar {
      display: none;
    }

    .tab-button {
      position: relative;
      flex: 0 0 auto;
      min-width: 46px;
      height: 40px;
      border: 0;
      border-bottom: 3px solid transparent;
      background: transparent;
      color: #6f6f74;
      font-size: 17px;
      font-weight: 780;
      line-height: 1;
      cursor: pointer;
      scroll-snap-align: start;
    }

    .tab-button[data-view="top"] {
      min-width: 54px;
    }

    .tab-button.is-active {
      border-bottom-color: var(--pink);
      color: var(--pink);
    }

    .content {
      padding: 14px 18px 88px;
    }

    .content:focus {
      outline: none;
    }

    .home-view {
      margin: -14px -18px 0;
    }

    .home-poster {
      position: relative;
      min-height: min(72svh, 680px);
      overflow: hidden;
      background: #111;
    }

    .home-poster img {
      display: block;
      width: 100%;
      height: min(72svh, 680px);
      min-height: 520px;
      object-fit: cover;
      object-position: center top;
    }

    .home-poster::after {
      position: absolute;
      inset: auto 0 0;
      height: 42%;
      content: "";
      background: linear-gradient(0deg, rgba(0,0,0,0.72), rgba(0,0,0,0));
      pointer-events: none;
    }

    .home-copy {
      position: absolute;
      right: 18px;
      bottom: 24px;
      left: 18px;
      z-index: 1;
      color: #fff;
    }

    .home-label {
      margin: 0;
      font-size: 11px;
      font-weight: 850;
      line-height: 1.5;
      text-transform: uppercase;
    }

    .home-title {
      margin: 7px 0 0;
      font-size: 27px;
      font-weight: 900;
      line-height: 1.16;
    }

    .home-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 0;
      padding: 0;
      list-style: none;
    }

    .home-meta li {
      min-height: 31px;
      padding: 7px 10px;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      font-size: 11px;
      font-weight: 850;
      line-height: 1.35;
    }

    .home-body {
      padding: 24px 18px 0;
    }

    .section-heading {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.4;
      color: var(--muted);
      text-transform: uppercase;
    }

    .group-section {
      padding-top: 22px;
    }

    .group-title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .group-title {
      margin: 0;
      background: linear-gradient(100deg, var(--pink), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.3;
    }

    .group-count {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.4;
      white-space: nowrap;
    }

    .group-description {
      margin: 0 0 12px;
      color: #33343a;
      font-size: 13px;
      font-weight: 540;
      line-height: 1.7;
    }

    .pickup-list {
      display: grid;
      gap: 1px;
      overflow: hidden;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: var(--line);
    }

    .pickup-button {
      display: grid;
      grid-template-columns: 56px 1fr 26px;
      align-items: center;
      gap: 14px;
      min-height: 66px;
      padding: 10px 0;
      border: 0;
      background: #fff;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }

    .pickup-number {
      color: var(--pink);
      font-size: 18px;
      font-weight: 900;
      text-align: center;
    }

    .pickup-main {
      min-width: 0;
    }

    .pickup-title {
      display: block;
      overflow-wrap: anywhere;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.45;
    }

    .pickup-artist {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      overflow-wrap: anywhere;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }

    .pickup-arrow {
      color: var(--blue);
      font-size: 22px;
      font-weight: 700;
    }

    .view-heading {
      margin: 0 0 14px;
      background: linear-gradient(100deg, var(--pink), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.3;
    }

    .work-kicker {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }

    .work-number {
      margin: 0;
      background: linear-gradient(100deg, var(--pink), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.2;
    }

    .work-index {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      line-height: 1.4;
    }

    .image-carousel {
      margin-bottom: 24px;
    }

    .carousel-track {
      display: flex;
      width: 100%;
      overflow-x: auto;
      border-radius: 6px;
      background: var(--soft);
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }

    .carousel-track::-webkit-scrollbar {
      display: none;
    }

    .carousel-slide {
      flex: 0 0 100%;
      width: 100%;
      scroll-snap-align: center;
    }

    .carousel-slide img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: var(--soft);
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      min-height: 24px;
      margin-top: 10px;
    }

    .carousel-dot {
      width: 8px;
      height: 8px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: #c9c9cf;
      cursor: pointer;
    }

    .carousel-dot.is-active {
      width: 22px;
      background: linear-gradient(90deg, var(--pink), var(--blue));
    }

    .info-list {
      margin: 0;
      border-top: 1px solid var(--line);
    }

    .info-row {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      align-items: center;
      min-height: 62px;
      border-bottom: 1px solid var(--line);
    }

    .info-label {
      background: linear-gradient(100deg, var(--pink), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.4;
    }

    .info-value {
      min-width: 0;
      margin: 0;
      color: var(--ink);
      font-size: 15px;
      font-weight: 820;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .sns-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
    }

    .sns-link {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
    }

    .sns-link svg {
      width: 28px;
      height: 28px;
      stroke-width: 1.9;
    }

    .caption-block {
      padding-top: 20px;
    }

    .caption-heading {
      margin: 0 0 10px;
      background: linear-gradient(100deg, var(--pink), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.45;
    }

    .caption-text {
      margin: 0;
      white-space: pre-line;
      color: #202024;
      font-size: 15px;
      font-weight: 520;
      line-height: 1.86;
      overflow-wrap: anywhere;
    }

    .thanks-list {
      display: grid;
      gap: 1px;
      margin: 18px 0 0;
      overflow: hidden;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: var(--line);
    }

    .thanks-item {
      padding: 16px 0;
      background: #fff;
    }

    .thanks-name {
      margin: 0;
      color: var(--ink);
      font-size: 16px;
      font-weight: 860;
      line-height: 1.45;
    }

    .thanks-note {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 560;
      line-height: 1.7;
    }

    .site-footer {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 25;
      width: min(100%, 430px);
      height: calc(46px + env(safe-area-inset-bottom));
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
      display: grid;
      place-items: center;
      background: linear-gradient(100deg, var(--pink), var(--violet), var(--blue));
      color: #fff;
      font-size: 13px;
      font-weight: 850;
      line-height: 1;
      text-transform: uppercase;
    }

    .menu-backdrop {
      position: fixed;
      inset: 0;
      z-index: 38;
      background: rgba(18,18,22,0.32);
    }

    .menu-panel {
      position: fixed;
      top: 0;
      left: 50%;
      z-index: 40;
      width: min(100%, 430px);
      max-height: 88dvh;
      padding: 22px 18px 26px;
      overflow-y: auto;
      background: #fff;
      box-shadow: 0 30px 80px rgba(10,10,16,0.22);
      transform: translateX(-50%);
    }

    [hidden] {
      display: none !important;
    }

    .menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .menu-title {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.5;
    }

    .menu-close {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .menu-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .menu-item,
    .menu-link,
    .menu-subitem,
    .menu-summary {
      width: 100%;
      min-height: 50px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
      font-weight: 850;
      text-align: left;
      text-decoration: none;
      cursor: pointer;
    }

    .menu-item,
    .menu-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
    }

    .menu-link::after,
    .menu-item::after {
      color: var(--blue);
      content: "›";
      font-size: 22px;
      font-weight: 750;
      line-height: 1;
    }

    .menu-details {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .menu-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border: 0;
      list-style: none;
    }

    .menu-summary::-webkit-details-marker {
      display: none;
    }

    .menu-summary::after {
      color: var(--blue);
      content: "⌄";
      font-size: 18px;
      font-weight: 850;
      line-height: 1;
    }

    .menu-details[open] .menu-summary::after {
      transform: rotate(180deg);
    }

    .menu-sublist {
      display: grid;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .menu-subitem {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 0 12px;
    }

    .menu-subitem span:last-child {
      color: var(--muted);
      font-size: 12px;
      font-weight: 780;
      white-space: nowrap;
    }

    .menu-item.is-active,
    .menu-subitem.is-active {
      border-color: transparent;
      background: linear-gradient(100deg, var(--pink), var(--blue));
      color: #fff;
    }

    .menu-subitem.is-active span:last-child {
      color: rgba(255,255,255,0.86);
    }

    .empty-state {
      padding: 44px 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .sns-link:focus-visible,
    .tab-button:focus-visible,
    .menu-button:focus-visible,
    .pickup-button:focus-visible,
    .menu-item:focus-visible,
    .menu-link:focus-visible,
    .menu-subitem:focus-visible,
    .menu-close:focus-visible,
    .carousel-dot:focus-visible,
    .menu-summary:focus-visible {
      outline: 3px solid rgba(36,153,214,0.32);
      outline-offset: 2px;
    }

    @media (max-width: 360px) {
      .site-header {
        padding-right: 14px;
        padding-left: 14px;
      }

      .brand-name {
        font-size: 24px;
      }

      .content {
        padding-right: 14px;
        padding-left: 14px;
      }

      .home-view {
        margin-right: -14px;
        margin-left: -14px;
      }

      .home-body {
        padding-right: 14px;
        padding-left: 14px;
      }

      .tab-strip {
        margin-right: -14px;
        margin-left: -14px;
        padding-right: 14px;
        padding-left: 14px;
      }

      .info-row {
        grid-template-columns: 96px minmax(0, 1fr);
      }

      .info-label,
      .info-value {
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .pickup-button,
      .tab-button,
      .carousel-dot,
      .menu-item,
      .menu-subitem {
        transition: transform 180ms ease, border-color 180ms ease, color 180ms ease, background 180ms ease;
      }

      .pickup-button:active,
      .menu-item:active,
      .menu-subitem:active {
        transform: scale(0.99);
      }
    }
  </style>
</head>

        }
      });

      document.querySelectorAll("[data-group]").forEach((button) => {

    function normalizeImages(images) {
      if (!Array.isArray(images)) {
        return [];
      }
      return images
        .map((image) => {
          if (typeof image === "string") {
            return { src: image, alt: "" };
          }
          return { src: image?.src, alt: image?.alt ?? "" };
        })
        .filter((image) => image.src);
    }

    function renderImageCarousel(work) {
      const images = normalizeImages(work.images);
      if (!images.length) {
        return "";
      }

      return `
        <section class="image-carousel" aria-label="${escapeHTML(work.title)} の画像">
          <div class="carousel-track" data-carousel-track>
            ${images.map((image, index) => `
              <div class="carousel-slide">
                <img src="${escapeHTML(image.src)}" alt="${escapeHTML(image.alt || `${work.title} 画像 ${index + 1}`)}">
              </div>
            `).join("")}
          </div>
          ${images.length > 1 ? `
            <div class="carousel-dots" aria-label="画像を切り替え">
              ${images.map((_, index) => `
                <button class="carousel-dot${index === 0 ? " is-active" : ""}" type="button" data-carousel-dot="${index}" aria-label="画像 ${index + 1} を表示"></button>
              `).join("")}
            </div>
          ` : ""}
        </section>
      `;
    }

    function hydrateCarousel() {
      const track = content.querySelector("[data-carousel-track]");
      if (!track) {
        return;
      }

      const dots = [...content.querySelectorAll("[data-carousel-dot]")];
      const updateDots = () => {
        if (!dots.length) {
          return;
        }
        const index = Math.round(track.scrollLeft / track.clientWidth);
        dots.forEach((dot, dotIndex) => {
          dot.classList.toggle("is-active", dotIndex === index);
        });
      };

      dots.forEach((dot) => {
        dot.addEventListener("click", () => {
          const index = Number(dot.dataset.carouselDot);
          track.scrollTo({ left: track.clientWidth * index, behavior: "smooth" });
        });
      });

      track.addEventListener("scroll", updateDots, { passive: true });
      updateDots();
    }

        return "";
      }
      return `<a class="sns-link" href="${escapeHTML(href)}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHTML(label)}">${icon}</a>`;
    }

    function renderSpecialThanks() {
      content.innerHTML = `
        <section class="thanks-view" aria-labelledby="thanksTitle">
          <h1 class="view-heading" id="thanksTitle">スペシャルサンクス</h1>
          <p class="group-description">展示を支えてくださったみなさまへの感謝を掲載しています。</p>
          <div class="thanks-list">
            ${specialThanks.map((item) => `
              <div class="thanks-item">
                <p class="thanks-name">${escapeHTML(item.name)}</p>
                <p class="thanks-note">${escapeHTML(item.note)}</p>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function render(view) {
      currentView = view;
      if (view === "top") {
        renderHome();
      } else if (view === "special") {
        renderSpecialThanks();
      } else if (view.startsWith("group:")) {
        renderGroupView(getGroup(view.replace("group:", "")));
      } else {
        renderWork(works.find((work) => work.number === view));
      }
      setActiveNavigation(view);
      closeMenu();
      content.focus({ preventScroll: true });
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    function navigate(view) {
      const hash = hashFromView(view);
      if (window.location.hash !== hash) {
        window.history.pushState({ view }, "", hash);
      }
      render(view);
    }

    function hashFromView(view) {
      if (view === "top") {
        return "#top";
      }
      if (view === "special") {
        return "#special-thanks";
      }
      if (view.startsWith("group:")) {
        return `#group-${view.replace("group:", "")}`;
      }
      return `#work-${view}`;
    }

    function viewFromHash() {
      const hash = window.location.hash.replace("#", "");
      if (!hash || hash === "top") {
        return "top";
      }
      if (hash === "special-thanks") {
        return "special";
      }
      const groupMatch = hash.match(/^group-([a-z0-9-]+)$/);
      if (groupMatch && groups.some((group) => group.id === groupMatch[1])) {
        return `group:${groupMatch[1]}`;
      }
      const workMatch = hash.match(/^work-(\d{2})$/);
      if (workMatch && works.some((work) => work.number === workMatch[1])) {
        return workMatch[1];
      }
      return "top";
    }

    function openMenu() {
      menuBackdrop.hidden = false;
      menuPanel.hidden = false;
      menuButton.setAttribute("aria-expanded", "true");
      menuClose.focus();
    }

    function closeMenu() {
      menuBackdrop.hidden = true;
      menuPanel.hidden = true;
      menuButton.setAttribute("aria-expanded", "false");
    }

    menuButton.addEventListener("click", openMenu);
    menuClose.addEventListener("click", closeMenu);
    menuBackdrop.addEventListener("click", closeMenu);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !menuPanel.hidden) {
        closeMenu();
        menuButton.focus();
      }

      const activeIndex = works.findIndex((work) => work.number === currentView);
      if (event.key === "ArrowRight" && activeIndex >= 0 && activeIndex < works.length - 1) {
        navigate(works[activeIndex + 1].number);
      }
      if (event.key === "ArrowLeft" && activeIndex > 0) {
        navigate(works[activeIndex - 1].number);
      }
    });

    window.addEventListener("popstate", () => render(viewFromHash()));

    buildNavigation();
    render(viewFromHash());
  </script>
</body>
</html>
